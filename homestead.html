    color: var(--white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: rgba(0, 36, 65, 0.55);
    z-index: 0;
  }

  body::after {
    content: 'H';
    position: fixed;
    right: -4vw;
    bottom: -8vw;
    font-family: var(--font);
    font-size: clamp(280px, 40vw, 560px);
    font-weight: 700;
    color: rgba(255,255,255,0.04);
    line-height: 1;
    letter-spacing: -0.05em;
    pointer-events: none;
    user-select: none;
    z-index: 0;
  }

  main {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 2rem 1.5rem;
    width: 100%;
    max-width: 580px;
    animation: fadeUp 1s ease 0.1s both;
  }

  .logo {
    font-family: 'Alte Haas Grotesk', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: clamp(0.6rem, 1.5vw, 0.75rem);
    font-weight: 400;
    letter-spacing: 0.55em;
    text-transform: lowercase;
    color: rgba(255,255,255,0.5);
    margin-bottom: 5rem;
  }

  h1 {
    font-family: var(--font);
    font-size: clamp(2.6rem, 7vw, 4.8rem);
    font-weight: 700;
    line-height: 1.0;
    letter-spacing: -0.02em;
    text-transform: lowercase;
    color: var(--white);
    margin-bottom: 1.5rem;
  }

  .subhead {
    font-family: var(--font);
    font-size: clamp(0.75rem, 1.8vw, 0.9rem);
    font-weight: 400;
    letter-spacing: 0.08em;
    line-height: 1.75;
    color: var(--muted);
    max-width: 380px;
    margin-bottom: 3.5rem;
  }

  .divider {
    width: 32px;
    height: 1px;
    background: rgba(255,255,255,0.25);
    margin: 0 auto 3.5rem;
  }

  form {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .input-row {
    display: flex;
    width: 100%;
    max-width: 420px;
  }

  input[type="email"] {
    flex: 1;
    font-family: var(--font);
    font-size: 0.8rem;
    font-weight: 400;
    letter-spacing: 0.08em;
    color: var(--white);
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.18);
    border-right: none;
    padding: 0.9rem 1.1rem;
    outline: none;
    -webkit-appearance: none;
    transition: background 0.2s, border-color 0.2s;
  }

  input[type="email"]::placeholder {
    color: rgba(255,255,255,0.28);
    letter-spacing: 0.1em;
  }

  input[type="email"]:focus {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.35);
  }

  button[type="submit"] {
    font-family: 'Alte Haas Grotesk', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 0.65rem;
    font-weight: 400;
    letter-spacing: 0.3em;
    text-transform: lowercase;
    color: var(--navy);
    background: var(--white);
    border: 1px solid var(--white);
    padding: 0.9rem 1.5rem;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
    -webkit-appearance: none;
  }

  button[type="submit"]:hover { background: rgba(255,255,255,0.88); }

  .fine {
    font-family: var(--font);
    font-size: 0.6rem;
    font-weight: 400;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.2);
    margin-top: 1.25rem;
    text-transform: lowercase;
  }

  .success-msg {
    display: none;
    font-family: var(--font);
    font-size: clamp(0.85rem, 2vw, 1rem);
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: lowercase;
    color: rgba(255,255,255,0.55);
    margin-top: 0.5rem;
  }

  footer {
    position: fixed;
    bottom: 2rem;
    left: 0;
    right: 0;
    z-index: 1;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 2.5rem;
    pointer-events: none;
  }

  .footer-note {
    font-family: var(--font);
    font-size: 0.55rem;
    font-weight: 400;
    letter-spacing: 0.25em;
    text-transform: lowercase;
    color: rgba(255,255,255,0.18);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 500px) {
    .input-row { flex-direction: column; }
    input[type="email"] {
      border-right: 1px solid rgba(255,255,255,0.18);
      border-bottom: none;
    }
    button[type="submit"] { padding: 0.9rem; }
    body::after { display: none; }
    footer { padding: 0 1.5rem; }
  }
</style>
</head>
<body>

<main>
  <p class="logo">homestead</p>
  <h1>coming<br>soon.</h1>
  <p class="subhead">not anykine clothes</p>
  <div class="divider"></div>
  <form onsubmit="handleSignup(event)" id="signup-form">
    <div class="input-row" id="form-row">
      <input type="email" name="email" id="email-input" placeholder="enter your email address" required autocomplete="email">
      <button type="submit" id="submit-btn">notify me</button>
    </div>
    <p class="fine" id="fine-text">no spam. unsubscribe at any time.</p>
    <p class="success-msg" id="success-msg">you're on the list &mdash; we'll be in touch.</p>
  </form>
</main>

<script>
  async function handleSignup(e) {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    btn.textContent = '...';
    btn.disabled = true;

    try {
      const res = await fetch('https://formspree.io/f/xojkwyrk', {
        method: 'POST',
        headers: { 'Accept': 'application/json' },
        body: new FormData(document.getElementById('signup-form'))
      });

      if (res.ok) {
        document.getElementById('form-row').style.display = 'none';
        document.getElementById('fine-text').style.display = 'none';
        document.getElementById('success-msg').style.display = 'block';
      } else {
        btn.textContent = 'try again';
        btn.disabled = false;
      }
    } catch {
      btn.textContent = 'try again';
      btn.disabled = false;
    }
  }
</script>
